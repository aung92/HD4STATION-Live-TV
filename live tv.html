<!DOCTYPE html>
<html lang='en' xmlns='http://www.w3.org/1999/xhtml' xmlns:b='http://www.google.com/2005/gml/b' xmlns:data='http://www.google.com/2005/gml/data' xmlns:expr='http://www.google.com/2005/gml/expr'>
<head>
    <meta charset='UTF-8'/>
    <meta content='width=device-width, initial-scale=1.0, viewport-fit=cover' name='viewport'/>
    <title>HD4STATION — Live TV</title>
    <style>
        /* ========== RESET & GLOBAL ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #080C14;
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, 'Segoe UI', sans-serif;
            color: #F0F4FF;
            overflow-x: hidden;
        }

        /* ========== LIVE TV PAGE STYLES ========== */
        .ltv-page-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 24px 28px 60px;
        }

        /* header area */
        .ltv-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 32px;
        }
        .ltv-brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .ltv-brand-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #00C4B4, #7C5CFC);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: white;
            box-shadow: 0 0 20px rgba(0,196,180,0.3);
        }
        .ltv-brand-text h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #00C4B4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .ltv-brand-text p {
            font-size: 13px;
            color: #A8B8CF;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
        }
        .live-pulse {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #FF4D4D;
            border-radius: 50%;
            animation: pulseLive 1.2s infinite;
            box-shadow: 0 0 6px #FF4D4D;
        }
        @keyframes pulseLive {
            0%,100% { opacity: 1; transform: scale(1);}
            50% { opacity: 0.5; transform: scale(1.2);}
        }

        /* server tabs */
        .ltv-server-tabs {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 28px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 6px;
        }
        .server-tab-btn {
            background: transparent;
            border: none;
            padding: 12px 28px;
            font-size: 15px;
            font-weight: 700;
            color: #6B7E98;
            cursor: pointer;
            border-radius: 40px;
            transition: 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: inherit;
        }
        .server-tab-btn i {
            font-size: 16px;
        }
        .server-tab-btn:hover {
            color: #F0F4FF;
            background: rgba(255,255,255,0.05);
        }
        .server-tab-btn.active {
            background: rgba(0,196,180,0.15);
            color: #00C4B4;
            border-bottom: 2px solid #00C4B4;
            border-radius: 40px 40px 0 0;
        }

        /* ========== ENHANCED PLAYER AREA (LARGER) ========== */
        .ltv-player-section {
            margin-bottom: 40px;
        }
        .player-wrapper {
            position: relative;
            background: #000000;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.12);
            transition: all 0.2s;
        }
        /* BIGGER ASPECT RATIO with increased size */
        .player-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            min-height: 480px;
        }
        @media (min-width: 1200px) {
            .player-container {
                min-height: 560px;
            }
        }
        @media (min-width: 1600px) {
            .player-container {
                min-height: 680px;
            }
        }
        .live-badge {
            position: absolute;
            top: 20px;
            left: 24px;
            z-index: 15;
            background: rgba(255,77,77,0.95);
            backdrop-filter: blur(8px);
            padding: 8px 20px;
            border-radius: 60px;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 1px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            pointer-events: none;
            box-shadow: 0 2px 12px rgba(0,0,0,0.4);
        }
        .live-badge .dot {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            animation: pulseLive 1s infinite;
        }
        .player-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }
        .player-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ========== SCROLLABLE CHANNELS (HORIZONTAL) ========== */
        .channels-section {
            margin: 28px 0 32px;
        }
        .section-head {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 18px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .section-head h3 {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-head h3 i {
            color: #00C4B4;
            font-size: 22px;
        }
        .scroll-hint {
            font-size: 12px;
            color: #6B7E98;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        /* horizontal scroll container */
        .channel-scroll {
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: thin;
            scrollbar-color: #00C4B4 #1C2A3C;
            padding-bottom: 12px;
            margin-bottom: 8px;
            -webkit-overflow-scrolling: touch;
        }
        .channel-scroll::-webkit-scrollbar {
            height: 6px;
        }
        .channel-scroll::-webkit-scrollbar-track {
            background: #1C2A3C;
            border-radius: 10px;
        }
        .channel-scroll::-webkit-scrollbar-thumb {
            background: #00C4B4;
            border-radius: 10px;
        }
        .channel-grid {
            display: flex;
            gap: 18px;
            min-width: min-content;
            padding: 6px 2px 8px;
        }
        /* channel card */
        .channel-card {
            flex-shrink: 0;
            width: 220px;
            background: #0D1320;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 18px 14px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            text-align: center;
            backdrop-filter: blur(2px);
        }
        .channel-card:hover {
            transform: translateY(-6px);
            border-color: #00C4B4;
            background: rgba(0,196,180,0.08);
            box-shadow: 0 15px 30px -12px rgba(0,0,0,0.5);
        }
        .channel-card.active {
            border-color: #00C4B4;
            background: rgba(0,196,180,0.15);
            box-shadow: 0 0 18px rgba(0,196,180,0.2);
        }
        .channel-icon {
            width: 64px;
            height: 64px;
            background: #1C2A3C;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #00C4B4;
            margin: 0 auto 14px;
            transition: all 0.2s;
        }
        .channel-card.active .channel-icon {
            background: #00C4B4;
            color: #080C14;
            box-shadow: 0 0 16px #00C4B4;
        }
        .channel-name {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .channel-status {
            font-size: 12px;
            color: #30E3A0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 6px;
        }
        .channel-badge {
            font-size: 10px;
            font-weight: 800;
            background: rgba(0,196,180,0.2);
            padding: 4px 12px;
            border-radius: 50px;
            color: #00C4B4;
            display: inline-block;
        }

        /* ========== INFO GRID (SERVER CARDS) ========== */
        .servers-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-top: 32px;
        }
        .server-info-card {
            background: #0D1320;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .server-info-card.active-info {
            background: rgba(0,196,180,0.08);
            border-color: #00C4B4;
        }
        .server-info-card:hover {
            background: #111927;
            border-color: rgba(0,196,180,0.3);
            transform: translateY(-2px);
        }
        .info-icon {
            width: 52px;
            height: 52px;
            background: #1C2A3C;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #00C4B4;
        }
        .info-content {
            flex: 1;
        }
        .info-title {
            font-size: 17px;
            font-weight: 800;
        }
        .info-desc {
            font-size: 12px;
            color: #A8B8CF;
            margin-top: 4px;
        }
        .live-tag {
            font-size: 11px;
            font-weight: 800;
            background: rgba(255,77,77,0.2);
            padding: 5px 12px;
            border-radius: 60px;
            color: #FF4D4D;
            white-space: nowrap;
        }

        /* ========== RESPONSIVE (MOBILE, TABLET) ========== */
        @media (max-width: 900px) {
            .ltv-page-container {
                padding: 16px 18px 40px;
            }
            .channel-card {
                width: 180px;
                padding: 12px 10px;
            }
            .channel-icon {
                width: 52px;
                height: 52px;
                font-size: 22px;
            }
            .channel-name {
                font-size: 14px;
            }
            .player-container {
                min-height: 280px;
            }
            .ltv-brand-text h1 {
                font-size: 22px;
            }
            .server-tab-btn {
                padding: 8px 18px;
                font-size: 13px;
            }
        }
        @media (max-width: 600px) {
            .ltv-page-container {
                padding: 12px 14px 32px;
            }
            .channel-card {
                width: 150px;
                padding: 10px 8px;
            }
            .channel-icon {
                width: 46px;
                height: 46px;
                font-size: 20px;
                margin-bottom: 8px;
            }
            .channel-name {
                font-size: 12px;
            }
            .channel-status {
                font-size: 9px;
            }
            .live-badge {
                top: 12px;
                left: 14px;
                padding: 4px 12px;
                font-size: 10px;
            }
            .player-container {
                min-height: 220px;
            }
            .servers-info-grid {
                gap: 12px;
            }
            .server-info-card {
                padding: 12px 14px;
            }
            .info-icon {
                width: 42px;
                height: 42px;
                font-size: 18px;
            }
            .info-title {
                font-size: 14px;
            }
            .section-head h3 {
                font-size: 18px;
            }
            .ltv-brand-icon {
                width: 42px;
                height: 42px;
                font-size: 20px;
            }
        }
        @media (max-width: 480px) {
            .ltv-server-tabs {
                gap: 8px;
            }
            .server-tab-btn {
                padding: 6px 14px;
                font-size: 12px;
            }
            .channel-card {
                width: 140px;
            }
            .channel-name {
                font-size: 11px;
            }
        }

        /* toast */
        .toast-message {
            position: fixed;
            bottom: 28px;
            right: 28px;
            background: #0D1320;
            border-left: 4px solid #00C4B4;
            padding: 12px 20px;
            border-radius: 16px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            z-index: 9999;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: fadeInUp 0.2s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .hidden {
            display: none;
        }
    </style>
    <!-- Font Awesome & Google Fonts -->
    <link href='https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap' rel='stylesheet'/>
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css'/>
</head>
<body>

<!-- MAIN LIVE TV SECTION (FULLY RESPONSIVE + ENLARGED PLAYER + SCROLLABLE CHANNELS) -->
<div class="ltv-page-container">
    <!-- Header with HD4STATION branding -->
    <div class="ltv-header">
        <div class="ltv-brand">
            <div class="ltv-brand-icon">
                <i class="fas fa-broadcast-tower"></i>
            </div>
            <div class="ltv-brand-text">
                <h1>HD4STATION Live TV</h1>
                <p><span class="live-pulse"></span> 24/7 Direct Streams · HD Quality</p>
            </div>
        </div>
    </div>

    <!-- Server Selector Tabs -->
    <div class="ltv-server-tabs" id="serverTabsContainer">
        <button class="server-tab-btn" data-server="0">
            <i class="fas fa-server"></i> <span>Server 1 · Mirraby</span>
        </button>
        <button class="server-tab-btn" data-server="1">
            <i class="fas fa-tower-broadcast"></i> <span>Server 2 · Ash TV</span>
        </button>
    </div>

    <!-- ENLARGED PLAYER SECTION (BIGGER AREA) -->
    <div class="ltv-player-section">
        <div class="player-wrapper">
            <div class="player-container">
                <div class="live-badge">
                    <span class="dot"></span> LIVE STREAM
                </div>
                <div class="player-frame">
                    <iframe id="livePlayerIframe" src="https://web.mswott.net/p?url=https%3A%2F%2Fmirraby.mswott.top%2FMSW%2FNai%2Fkhai%2Ffaka.php&amp;__src=https%3A%2F%2Fmirraby.mswott.top%2FMSW%2FNai%2Fkhai%2Ffaka.php&amp;__type=document" allow="fullscreen; autoplay; encrypted-media" allowfullscreen></iframe>
                </div>
            </div>
        </div>
    </div>

    <!-- SCROLLABLE CHANNELS LIST (fully responsive, horizontal scroll) -->
    <div class="channels-section">
        <div class="section-head">
            <h3><i class="fas fa-satellite-dish"></i> Available Channels</h3>
            <div class="scroll-hint"><i class="fas fa-arrows-alt-h"></i> Swipe or scroll →</div>
        </div>
        <div class="channel-scroll" id="channelScrollWrapper">
            <div class="channel-grid" id="channelGrid">
                <!-- dynamic channels from JS -->
            </div>
        </div>
    </div>

    <!-- Server Info Cards (Quick selection) -->
    <div class="servers-info-grid" id="serverInfoGrid">
        <!-- populated dynamically -->
    </div>
</div>

<script>
    (function() {
        // HD4STATION LIVE TV MODULE
        // Server list (original sources)
        const SERVERS = [
            {
                id: 0,
                name: 'Mirraby Stream',
                short: 'Server 1',
                url: 'https://web.mswott.net/p?url=https%3A%2F%2Fmirraby.mswott.top%2FMSW%2FNai%2Fkhai%2Ffaka.php&__src=https%3A%2F%2Fmirraby.mswott.top%2FMSW%2FNai%2Fkhai%2Ffaka.php&__type=document',
                icon: 'fa-play-circle',
                quality: 'HD 1080p'
            },
            {
                id: 1,
                name: 'Ash TV Bangladesh',
                short: 'Server 2',
                url: 'https://web.mswott.net/p?url=http%3A%2F%2F103.144.89.251%2F&__src=http%3A%2F%2F103.144.89.251%2F&__type=document',
                icon: 'fa-tower-broadcast',
                quality: 'HD Live'
            }
        ];

        let activeServerId = 0;   // default server 0

        // DOM elements
        const playerFrame = document.getElementById('livePlayerIframe');
        const channelGrid = document.getElementById('channelGrid');
        const serverInfoGridEl = document.getElementById('serverInfoGrid');
        const tabButtons = document.querySelectorAll('.server-tab-btn');

        // Helper: show toast message
        function showToast(msg, type = 'info') {
            let existingToast = document.querySelector('.toast-message');
            if(existingToast) existingToast.remove();
            const toast = document.createElement('div');
            toast.className = 'toast-message';
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'}" style="margin-right: 8px; color: #00C4B4;"></i> ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => {
                if(toast) toast.remove();
            }, 2800);
        }

        // Switch server (main function)
        function switchServer(serverId, updateActiveUI = true) {
            const server = SERVERS.find(s => s.id === serverId);
            if (!server) return;
            activeServerId = serverId;
            // Update iframe source
            if (playerFrame) {
                playerFrame.src = server.url;
            }
            // Update active states for tabs
            if (updateActiveUI) {
                tabButtons.forEach(btn => {
                    const btnServer = parseInt(btn.getAttribute('data-server'), 10);
                    if (btnServer === serverId) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });
            }
            // Update channel cards active highlight
            const channelCards = document.querySelectorAll('.channel-card');
            channelCards.forEach(card => {
                const cardServer = parseInt(card.getAttribute('data-server-id'), 10);
                if (cardServer === serverId) {
                    card.classList.add('active');
                } else {
                    card.classList.remove('active');
                }
            });
            // Update info cards active style
            const infoCards = document.querySelectorAll('.server-info-card');
            infoCards.forEach(card => {
                const cardId = parseInt(card.getAttribute('data-info-server'), 10);
                if (cardId === serverId) {
                    card.classList.add('active-info');
                } else {
                    card.classList.remove('active-info');
                }
            });
            showToast(`Switched to ${server.name}`, 'success');
        }

        // Build channel list (horizontal scrollable)
        function buildChannelList() {
            if (!channelGrid) return;
            channelGrid.innerHTML = '';
            SERVERS.forEach(server => {
                const isActive = (server.id === activeServerId);
                const card = document.createElement('div');
                card.className = `channel-card ${isActive ? 'active' : ''}`;
                card.setAttribute('data-server-id', server.id);
                card.setAttribute('data-server-url', server.url);
                card.innerHTML = `
                    <div class="channel-icon">
                        <i class="fas ${server.icon}"></i>
                    </div>
                    <div class="channel-name">${server.name}</div>
                    <div class="channel-status"><i class="fas fa-circle" style="font-size: 8px; color:#30E3A0;"></i> LIVE</div>
                    <span class="channel-badge">${server.quality || 'HD'}</span>
                `;
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    switchServer(server.id, true);
                });
                channelGrid.appendChild(card);
            });
        }

        // Build server info grid (larger cards)
        function buildServerInfoGrid() {
            if (!serverInfoGridEl) return;
            serverInfoGridEl.innerHTML = '';
            SERVERS.forEach(server => {
                const isActive = (server.id === activeServerId);
                const infoCard = document.createElement('div');
                infoCard.className = `server-info-card ${isActive ? 'active-info' : ''}`;
                infoCard.setAttribute('data-info-server', server.id);
                infoCard.innerHTML = `
                    <div class="info-icon">
                        <i class="fas ${server.icon}"></i>
                    </div>
                    <div class="info-content">
                        <div class="info-title">${server.name}</div>
                        <div class="info-desc">${server.quality} · 24/7 Stable</div>
                    </div>
                    <div class="live-tag"><span class="live-pulse" style="display: inline-block; width:6px; height:6px; margin-right: 6px;"></span> LIVE</div>
                `;
                infoCard.addEventListener('click', () => {
                    switchServer(server.id, true);
                });
                serverInfoGridEl.appendChild(infoCard);
            });
        }

        // Initialize tabs click handlers
        function initTabs() {
            tabButtons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const serverVal = parseInt(btn.getAttribute('data-server'), 10);
                    if (!isNaN(serverVal)) {
                        switchServer(serverVal, true);
                    }
                });
            });
        }

        // Make channel scroll area smooth + ensure proper display after resize
        function ensureScrollable() {
            const scrollContainer = document.getElementById('channelScrollWrapper');
            if (scrollContainer) {
                // just add smooth style
                scrollContainer.style.scrollBehavior = 'smooth';
                // optional: initial scroll to active channel? not needed but nice.
            }
        }

        // initial load: set default active server (0) and build UI
        function initLiveTV() {
            buildChannelList();
            buildServerInfoGrid();
            initTabs();
            ensureScrollable();
            // ensure the iframe loads the default server (0)
            if (playerFrame && SERVERS[0]) {
                playerFrame.src = SERVERS[0].url;
            }
            // set active UI for default
            switchServer(activeServerId, true);
            // Add window resize observer to maintain any scroll issues (just in case)
            window.addEventListener('resize', () => {
                // re-trigger scroll container styling
                if(document.getElementById('channelScrollWrapper')) {
                    // nothing heavy, just ensure overflow
                }
            });
        }

        // start everything after DOM ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initLiveTV);
        } else {
            initLiveTV();
        }
    })();
</script>

<!-- Optional: small inline to handle any Blogger conflicts, but fully functional -->
</body>
</html>
